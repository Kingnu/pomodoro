<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" id="themeColor" content="#C0392B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="番茄钟">
<title>番茄钟</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(160deg,#C0392B 0%,#922B21 100%);
  transition:background 0.6s ease;
  display:flex;flex-direction:column;align-items:center;
  height:100%;color:#fff;
}

/* ── 顶部标签 ── */
.tabs{
  display:flex;gap:8px;margin-top:env(safe-area-inset-top,20px);
  margin-top:calc(env(safe-area-inset-top,0px) + 20px);
  padding:0 20px;width:100%;justify-content:center;
}
.tab{
  flex:1;max-width:110px;padding:9px 4px;border-radius:30px;
  font-size:14px;font-weight:600;text-align:center;
  background:rgba(255,255,255,0.15);
  border:none;color:rgba(255,255,255,0.7);cursor:pointer;
  transition:background 0.2s,color 0.2s,transform 0.1s;
}
.tab.active{background:rgba(255,255,255,0.9);color:#C0392B}
.tab:active{transform:scale(0.95)}

/* ── 主体 ── */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%}

/* ── 圆形计时环 ── */
.ring-wrap{position:relative;width:260px;height:260px;margin-bottom:10px}
.ring-wrap svg{width:100%;height:100%}
.ring-bg{stroke:rgba(255,255,255,0.15)}
.ring-prog{
  stroke:#fff;
  stroke-linecap:round;
  transition:stroke-dashoffset 0.8s linear;
  transform:rotate(-90deg);
  transform-origin:50% 50%;
}
.ring-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.time-text{font-size:62px;font-weight:300;letter-spacing:2px;line-height:1}
.mode-lbl{font-size:14px;opacity:0.8;margin-top:6px;font-weight:500}

/* ── 控制按钮 ── */
.controls{display:flex;align-items:center;gap:28px;margin-top:10px}
.btn-side{
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,0.18);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,transform 0.1s;
}
.btn-side:active{transform:scale(0.93);background:rgba(255,255,255,0.3)}
.btn-main{
  width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;
  background:#fff;font-size:20px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.25);
  transition:transform 0.1s,box-shadow 0.1s;
  color:#C0392B;
}
.btn-main:active{transform:scale(0.94);box-shadow:0 4px 15px rgba(0,0,0,0.2)}
#btnMainText{font-size:18px;font-weight:700;color:inherit}

/* ── 番茄计数 ── */
.dots-wrap{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.dots{display:flex;gap:12px}
.dot{
  width:20px;height:20px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:background 0.3s,transform 0.3s;
}
.dot.done{background:#fff;transform:scale(1.1)}
.total-count{font-size:13px;opacity:0.65}

/* ── 安装提示 ── */
.install-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
  padding:14px 20px calc(14px + env(safe-area-inset-bottom,0px));
  flex-direction:row;align-items:center;justify-content:space-between;
  gap:10px;
}
.install-bar.show{display:flex}
.install-txt{font-size:14px;flex:1}
.install-btn{
  background:#fff;color:#C0392B;font-weight:700;font-size:14px;
  border:none;border-radius:20px;padding:8px 18px;cursor:pointer;white-space:nowrap;
}
.install-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;opacity:0.7;padding:0 4px}
</style>
</head>
<body>

<!-- 模式标签 -->
<div class="tabs">
  <button class="tab active" onclick="switchMode('focus')"   id="tab-focus">🍅 专注</button>
  <button class="tab"        onclick="switchMode('shortBreak')" id="tab-shortBreak">☕ 短休息</button>
  <button class="tab"        onclick="switchMode('longBreak')"  id="tab-longBreak">🌙 长休息</button>
</div>

<!-- 主体 -->
<div class="main">
  <!-- 圆环 -->
  <div class="ring-wrap">
    <svg viewBox="0 0 260 260">
      <circle class="ring-bg" cx="130" cy="130" r="112" fill="none" stroke-width="12"/>
      <circle class="ring-prog" id="ring" cx="130" cy="130" r="112" fill="none" stroke-width="12"
        stroke-dasharray="703.7" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-center">
      <span class="time-text" id="timeDisplay">25:00</span>
      <span class="mode-lbl"  id="modeLabel">点击开始专注</span>
    </div>
  </div>

  <!-- 控制 -->
  <div class="controls">
    <button class="btn-side" onclick="resetTimer()" title="重置">↺</button>
    <button class="btn-main" onclick="toggleTimer()">
      <span id="btnMainText">开始</span>
    </button>
    <button class="btn-side" onclick="skipSession()" title="跳过">⏭</button>
  </div>

  <!-- 番茄点 -->
  <div class="dots-wrap">
    <div class="dots" id="dots"></div>
    <span class="total-count" id="totalCount">今日已完成 0 个番茄 🍅</span>
  </div>
</div>

<!-- 安装提示条 -->
<div class="install-bar" id="installBar">
  <span class="install-txt">📲 添加到主屏幕，像 App 一样使用</span>
  <button class="install-btn" id="installBtn">安装</button>
  <button class="install-close" onclick="closeInstall()">×</button>
</div>

<script>
// ── 配置 ──────────────────────────────────────────────────────
const MODES = {
  focus:      { label:'专注中…',   time:25*60, bg:'linear-gradient(160deg,#C0392B 0%,#922B21 100%)', tabColor:'#C0392B' },
  shortBreak: { label:'短休息中…', time:5*60,  bg:'linear-gradient(160deg,#1E8449 0%,#145A32 100%)', tabColor:'#1E8449' },
  longBreak:  { label:'长休息中…', time:15*60, bg:'linear-gradient(160deg,#1A5276 0%,#154360 100%)', tabColor:'#1A5276' },
}
const CIRC = 703.7  // 2π×112

// ── 状态 ──────────────────────────────────────────────────────
let mode       = 'focus'
let timeLeft   = MODES.focus.time
let totalTime  = MODES.focus.time
let isRunning  = false
let timerId    = null
let pomoDone   = 0   // 累计完成番茄数
let roundCount = 0   // 本轮已完成专注数（用于判断长休息）
let wakeLock   = null
let deferredPrompt = null

// ── DOM ───────────────────────────────────────────────────────
const $time   = document.getElementById('timeDisplay')
const $label  = document.getElementById('modeLabel')
const $ring   = document.getElementById('ring')
const $btn    = document.getElementById('btnMainText')
const $dots   = document.getElementById('dots')
const $total  = document.getElementById('totalCount')
const $theme  = document.getElementById('themeColor')

// ── 初始化 ────────────────────────────────────────────────────
function init() {
  renderDots()
  updateDisplay()
  // 注册 Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {})
  }
}

// ── 切换模式 ──────────────────────────────────────────────────
function switchMode(m) {
  if (isRunning) pauseTimer()
  mode      = m
  timeLeft  = MODES[m].time
  totalTime = MODES[m].time
  // 更新背景
  document.body.style.background = MODES[m].bg
  $theme.setAttribute('content', MODES[m].tabColor)
  document.querySelector('meta[name="theme-color"]').content = MODES[m].tabColor
  // 更新标签高亮
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('tab-' + m).classList.add('active')
  // 更新主按钮颜色
  document.querySelector('.btn-main').style.color = MODES[m].tabColor
  updateDisplay()
}

// ── 开始/暂停 ─────────────────────────────────────────────────
function toggleTimer() {
  isRunning ? pauseTimer() : startTimer()
}

function startTimer() {
  if (timeLeft <= 0) { resetTimer(); return }
  isRunning = true
  $btn.textContent = '暂停'
  $label.textContent = MODES[mode].label
  requestWakeLock()
  timerId = setInterval(tick, 1000)
}

function pauseTimer() {
  isRunning = false
  clearInterval(timerId)
  timerId = null
  $btn.textContent = '继续'
  $label.textContent = '已暂停'
  releaseWakeLock()
}

function resetTimer() {
  isRunning = false
  clearInterval(timerId)
  timerId = null
  timeLeft = MODES[mode].time
  totalTime = MODES[mode].time
  $btn.textContent = '开始'
  $label.textContent = mode === 'focus' ? '点击开始专注' : '点击开始休息'
  releaseWakeLock()
  updateDisplay()
}

// ── 跳过 ──────────────────────────────────────────────────────
function skipSession() {
  pauseTimer()
  autoNextMode()
}

// ── 每秒 tick ─────────────────────────────────────────────────
function tick() {
  timeLeft--
  updateDisplay()
  if (timeLeft <= 0) onComplete()
}

// ── 完成回调 ──────────────────────────────────────────────────
function onComplete() {
  pauseTimer()
  playBeep()
  vibrate()

  if (mode === 'focus') {
    pomoDone++
    roundCount++
    renderDots()
    $total.textContent = `今日已完成 ${pomoDone} 个番茄 🍅`
  }
  autoNextMode()
}

function autoNextMode() {
  if (mode === 'focus') {
    switchMode(roundCount % 4 === 0 ? 'longBreak' : 'shortBreak')
  } else {
    if (mode === 'longBreak') roundCount = 0
    switchMode('focus')
  }
}

// ── 更新界面 ──────────────────────────────────────────────────
function updateDisplay() {
  const m = String(Math.floor(timeLeft / 60)).padStart(2, '0')
  const s = String(timeLeft % 60).padStart(2, '0')
  $time.textContent = `${m}:${s}`

  const pct = totalTime > 0 ? timeLeft / totalTime : 1
  $ring.style.strokeDashoffset = (CIRC * (1 - pct)).toFixed(2)

  if (!isRunning && timeLeft === totalTime) {
    $label.textContent = mode === 'focus' ? '点击开始专注' : '点击开始休息'
    $btn.textContent = '开始'
  }
}

// ── 番茄点渲染 ────────────────────────────────────────────────
function renderDots() {
  $dots.innerHTML = ''
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div')
    d.className = 'dot' + (i < roundCount % 4 || (roundCount % 4 === 0 && roundCount > 0 && i < 4) ? ' done' : '')
    // 当轮进度：roundCount % 4，满4时全亮
    $dots.appendChild(d)
  }
  // 重新计算当轮进度
  $dots.innerHTML = ''
  const cur = roundCount % 4
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div')
    d.className = 'dot' + (i < cur ? ' done' : '')
    $dots.appendChild(d)
  }
}

// ── 音效（Web Audio API，无需文件）────────────────────────────
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)()
    const notes = [880, 1108, 1318]
    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator()
      const gain = ctx.createGain()
      osc.connect(gain); gain.connect(ctx.destination)
      osc.type = 'sine'
      osc.frequency.value = freq
      const t = ctx.currentTime + i * 0.18
      gain.gain.setValueAtTime(0, t)
      gain.gain.linearRampToValueAtTime(0.25, t + 0.05)
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4)
      osc.start(t); osc.stop(t + 0.4)
    })
  } catch (e) {}
}

// ── 震动 ──────────────────────────────────────────────────────
function vibrate() {
  navigator.vibrate && navigator.vibrate([200, 80, 200, 80, 400])
}

// ── 唤醒锁（防止息屏）────────────────────────────────────────
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen')
    }
  } catch (e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && isRunning) requestWakeLock()
})

// ── PWA 安装提示 ──────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault()
  deferredPrompt = e
  document.getElementById('installBar').classList.add('show')
})
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return
  deferredPrompt.prompt()
  const { outcome } = await deferredPrompt.userChoice
  deferredPrompt = null
  if (outcome === 'accepted') closeInstall()
}
function closeInstall() {
  document.getElementById('installBar').classList.remove('show')
}
window.addEventListener('appinstalled', closeInstall)

// ── 启动 ──────────────────────────────────────────────────────
init()
</script>
</body>
</html>
